services:
  app:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
      - "9230:9230"
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      NODE_OPTIONS: --inspect=0.0.0.0:9229
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules/next ]; then npm ci; fi &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  node_modules:
